name: MISO ERAS Monitor

# Once-daily check, 1pm Eastern Time, Monday-Friday only. Always emails —
# even when no changes — as a heartbeat that confirms the monitor is running.
#
# DST handling: during EDT (UTC-4), 1pm ET = 17:00 UTC. During EST (UTC-5),
# 1pm ET = 18:00 UTC. When DST flips back to EST in November, change the
# hour value from 17 to 18.

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 1:00 PM ET, Mon-Fri (change to 18 in winter)
  workflow_dispatch:  # manual runs always work

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Show timing context
        run: |
          echo "UTC time:     $(date -u)"
          echo "Eastern time: $(TZ='America/New_York' date)"
          echo "Day of week:  $(TZ='America/New_York' date +%A)"
          echo "Trigger:      ${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MONITOR_TO_ADDR: ${{ secrets.MONITOR_TO_ADDR }}
          MONITOR_FROM_ADDR: ${{ secrets.MONITOR_FROM_ADDR }}
        run: python monitors/miso_eras/monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f "monitors/miso_eras/snapshots/latest.json" ]; then
            git add monitors/miso_eras/snapshots/latest.json
          fi
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "miso_eras: snapshot update"
            git push
          fi
