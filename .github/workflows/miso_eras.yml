name: MISO ERAS Monitor

# IMPORTANT: GitHub Actions cron is UTC and frequently runs LATE on the
# free tier (often 15-60+ minutes late during peak hours). The previous
# version of this file had a "gate" step that compared the runner's
# Eastern Time hour against 9am/5pm and skipped runs that didn't match.
# That broke whenever GitHub delayed a cron — by the time the runner
# actually started, the ET hour had already moved on, so the gate
# skipped every scheduled run. The result: zero scheduled emails.
#
# This version removes the gate. Every cron fires the monitor unconditionally.
# DST is handled manually: during EDT (mid-March - early November) use
# UTC times 13 and 21; during EST swap to 14 and 22.
#
# CURRENTLY: dense testing schedule (every 30 min from 14:00-21:30 UTC =
# 10am-5:30pm EDT). Once you've confirmed it's working, replace the
# schedule block with just the two production crons (commented below).

on:
  schedule:
    # ----- TESTING SCHEDULE (delete after verifying) -----
    - cron: "0 14 * * *"     # 10:00 AM EDT
    - cron: "30 14 * * *"    # 10:30 AM EDT
    - cron: "0 15 * * *"     # 11:00 AM EDT
    - cron: "30 15 * * *"    # 11:30 AM EDT
    - cron: "0 16 * * *"     # 12:00 PM EDT
    - cron: "30 16 * * *"    # 12:30 PM EDT
    - cron: "0 17 * * *"     # 1:00 PM EDT
    - cron: "30 17 * * *"    # 1:30 PM EDT
    - cron: "0 18 * * *"     # 2:00 PM EDT
    - cron: "30 18 * * *"    # 2:30 PM EDT
    - cron: "0 19 * * *"     # 3:00 PM EDT
    - cron: "30 19 * * *"    # 3:30 PM EDT
    - cron: "0 20 * * *"     # 4:00 PM EDT
    - cron: "30 20 * * *"    # 4:30 PM EDT
    - cron: "0 21 * * *"     # 5:00 PM EDT
    - cron: "30 21 * * *"    # 5:30 PM EDT
    # ----- PRODUCTION SCHEDULE (uncomment after testing) -----
    # - cron: "0 13 * * *"   # 9:00 AM EDT (change to 14 in winter)
    # - cron: "0 21 * * *"   # 5:00 PM EDT (change to 22 in winter)
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Show timing context
        run: |
          echo "UTC time:     $(date -u)"
          echo "Eastern time: $(TZ='America/New_York' date)"
          echo "Trigger:      ${{ github.event_name }}"
          echo "Schedule:     ${{ github.event.schedule }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MONITOR_TO_ADDR: ${{ secrets.MONITOR_TO_ADDR }}
          MONITOR_FROM_ADDR: ${{ secrets.MONITOR_FROM_ADDR }}
        run: python monitors/miso_eras/monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitors/miso_eras/snapshots/latest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "miso_eras: snapshot update"
            git push
          fi
