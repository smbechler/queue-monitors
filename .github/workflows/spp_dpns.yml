name: SPP DPNS Monitor

# Weekly check, Fridays at 1:00 PM Eastern. Always emails (heartbeat) —
# noting any new DPNS study postings or "none new".
#
# DST handling: during EDT (UTC-4), 1pm ET = 17:00 UTC. During EST (UTC-5),
# 1pm ET = 18:00 UTC. Change "17" to "18" when DST flips back in November.

on:
  schedule:
    - cron: "0 17 * * 5"   # 1:00 PM EDT every Friday (change to 18 in winter)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Show timing context
        run: |
          echo "UTC time:     $(date -u)"
          echo "Eastern time: $(TZ='America/New_York' date)"
          echo "Trigger:      ${{ github.event_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MONITOR_TO_ADDR: ${{ secrets.MONITOR_TO_ADDR }}
          MONITOR_FROM_ADDR: ${{ secrets.MONITOR_FROM_ADDR }}
        run: python monitors/spp_dpns/monitor.py

      - name: Commit updated seen-set
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f "monitors/spp_dpns/snapshots/seen.json" ]; then
            git add monitors/spp_dpns/snapshots/seen.json
          fi
          if git diff --cached --quiet; then
            echo "No seen-set changes to commit."
          else
            git commit -m "spp_dpns: seen-set update"
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "Push failed (attempt $attempt) — pulling and retrying"
              git pull --rebase origin main
              [ "$attempt" = "3" ] && exit 1
              sleep 2
            done
          fi
